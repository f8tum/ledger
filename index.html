<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledger - Personal Finance</title>

  <!-- Icons Font aweome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="tracker.css">

  <!-- Script -->
  <script defer src="tracker.js"></script>
</head>

<body>
  <!-- Header Section -->
  <header class="header">
    <!-- Logo -->
    <div class="header-left">
      <a href="#"><h1>Led<span>ger</span></h1></a>
    </div>

    <!-- Date -->
    <div class="header-right">
      <p id="day">Tuesday, 3 March 2026</p>
    </div>
  </header>

  <!-- Financial Details -->
  <section class="financials">
    <!-- Balance -->
    <div class="financials-card" id="balance">
      <p>Net balance</p>
      <h3 id="financials-net-balance">₹0.00</h3>
    </div>

    <div class="financials-card" id="income">
      <p>Total income</p>
      <h3 id="financials-income">₹0.00</h3>
    </div>

    <div class="financials-card" id="expenses">
      <p>Total expenses</p>
      <h3 id="financials-expenses">₹0.00</h3>
    </div>
  </section>

  <!-- Main content -->
  <section class="content">
    <!-- Left content -->
    <div class="content-left">
      <!-- transactions -->
      <div class="transactions empty">
        <p class="title">Transactions</p>

        <div class="categories">
          <button>all</button>
          <button>income</button>
          <button>expenses</button>
        </div>

        <div class="history">
          <div class="empty-state">
            <p>No transactions found</p>
          </div>
        </div>
      </div>

      <!-- Infographics -->
      <div class="infographics">
        <p class="title">this week</p>

        <div class="charts">

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Monday</p>
          </div>

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Tuesday</p>
          </div>

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Wednesday</p>
          </div>

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Thursday</p>
          </div>

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Friday</p>
          </div>

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Saturday</p>
          </div>

          <div class="day">
            <div class="bars">
              <div class="bar-income"></div>
              <div class="bar-expense"></div>
            </div>
            <p>Sunday</p>
          </div>
        </div>

        <div class="legend">
          <p class="info-income">Income</p>
          <p class="info-expense">Expenses</p>
        </div>
      </div>
    </div>

    <!-- Content right -->
    <div class="content-right">
      <!-- New form entry -->
      <div class="new-entry">
        <p class="title">New entry</p>

        <form id="entry-form">
          <div class="form-group">
            <label class="form-label">type</label>
            <div class="type-toggle">
              <button type="button" class="type-btn income-btn active" id="incomeBtn">+ income</button>
              <button type="button" class="type-btn expense-btn" id="expenseBtn">- expense</button>
            </div>
          </div>

          <div class="form-group">
            <label for="description" class="form-label">description</label>
            <input type="text" class="form-input" id="description" placeholder="e.g. Salary, Groceries..." required> 
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="amount" class="form-label">amount (₹)</label>
              <input type="number" class="form-input" id="amount" placeholder="0.00" step="0.01" min="0" required>
            </div>
            <div class="form-group">
              <label for="date" class="form-label">date</label>
              <input type="date" id="date" class="form-input date-input" required>
            </div>
          </div>

          <div class="form-group">
            <label for="category" class="form-label">category</label>
            <div class="select-wrapper">
              <select id="category" class="form-input form-select" required>
                <option>Shopping</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Entertainment</option>
                <option>Health</option>
                <option>Utilities</option>
                <option>Salary</option>
                <option>Freelance</option>
                <option>Other</option>
              </select>
              <i class="fa-solid fa-chevron-down select-icon"></i>
            </div>
          </div>

          <button type="submit" class="add-btn">add transaction</button>
        </form>
      </div>

      <div class="expense-breakdown empty">
        <p class="title">Expense breakdown</p>

        <div class="empty-state">
          <p>No expenses recorded</p>
        </div>

        <div class="breakdown-item">
          <div class="breakdown-item-header">
            <p class="breakdown-item-label">Food</p>
            <div class="breakdown-item-right">
              <p class="breakdown-item-percent">32%</p>
              <p class="breakdown-item-amount">₹320.00</p>
            </div>
          </div>
          <div class="breakdown-bar-track">
            <div class="breakdown-bar-fill" style="width: 40%"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
